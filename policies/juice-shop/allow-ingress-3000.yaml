# Allow ingress to the app on port 3000 only. Everything else is denied by
# default-deny-all. This is the single doorway the attacker (Kali) comes through.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-3000
  namespace: juice-shop
spec:
  podSelector:
    matchLabels:
      app: juice-shop
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 3000
