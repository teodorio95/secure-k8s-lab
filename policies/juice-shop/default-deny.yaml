# Default-deny posture: nothing in/out of the juice-shop namespace unless
# explicitly allowed by another policy. This is the core "defend" move —
# the vulnerable target cannot pivot to the rest of the cluster.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: juice-shop
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
