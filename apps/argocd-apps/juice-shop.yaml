# ArgoCD Application for the Juice Shop target, rendered from our own Helm chart.
# Synced automatically by the root app-of-apps.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: juice-shop
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://gitlab.com/teodorio95/secure-k8s-lab.git
    targetRevision: HEAD
    path: chart
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    # The chart templates the namespace itself (with the PSA labels).
    namespace: juice-shop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
